<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vector Calculator</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 500px; margin: auto; }
        .input-box { margin-bottom: 15px; }
        input, select { width: 100%; padding: 8px; margin-top: 5px; }
        button { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; cursor: pointer; }
        #history { margin-top: 20px; border-top: 1px solid #ccc; padding-top: 10px; }
    </style>
</head>
<body>
    <h2>Vector Calculator</h2>
    
    <div class="input-box">
        Magnitude: <input type="number" id="vmag">
    </div>
    <div class="input-box">
        Angle (Degrees): <input type="number" id="vang">
    </div>
    <div class="input-box">
        Quadrant: 
        <select id="vquad">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
        </select>
    </div>

    <button onclick="calculateAndAdd()">Add Vector</button>

    <h3>Total Result: <span id="finalResult">0i + 0j</span></h3>
    
    <div id="history">
        <strong>History:</strong>
        <p id="historyLog"></p>
    </div>

    <script>
        let finalXResult = 0; // Replaces your Java finalXResult
        let finalYResult = 0; // Replaces your Java finalYResult

        function calculateAndAdd() {
            // Get values from the HTML page
            const mag = parseFloat(document.getElementById('vmag').value);
            const deg = parseFloat(document.getElementById('vang').value);
            const quad = parseInt(document.getElementById('vquad').value);
            
            // Convert degrees to radians (Same as your degreesToRadians method)
            const rad = deg * (Math.PI / 180);

            // X-Component logic (From your vectorXValue method)
            let xResult = mag * Math.cos(rad);
            if (quad === 2 || quad === 3) xResult *= -1;

            // Y-Component logic (From your vectorYValue method)
            let yResult = mag * Math.sin(rad);
            if (quad === 3 || quad === 4) yResult *= -1;

            // Accumulate totals
            finalXResult += xResult;
            finalYResult += yResult;

            // Update the display
            document.getElementById('finalResult').innerText = 
                `${finalXResult.toFixed(2)}i + ${finalYResult.toFixed(2)}j`;
            
            // Update history log
            const logEntry = `${xResult.toFixed(2)}i + ${yResult.toFixed(2)}j<br>`;
            document.getElementById('historyLog').innerHTML += logEntry;
        }
    </script>
</body>
</html>
